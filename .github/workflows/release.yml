name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create (e.g., v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            runner: ubuntu-latest
            binary: mantracode-linux-x64
          - target: bun-linux-arm64
            runner: ubuntu-latest
            binary: mantracode-linux-arm64
          - target: bun-darwin-arm64
            runner: macos-latest
            binary: mantracode-darwin-arm64
          - target: bun-darwin-x64
            runner: macos-latest
            binary: mantracode-darwin-x64
          - target: bun-windows-x64
            runner: windows-latest
            binary: mantracode-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Install all native OpenTUI packages (for cross-compilation)
        shell: bash
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            dir="node_modules/@opentui/core-${pkg}"
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              echo "core-${pkg} already installed, skipping"
              continue
            fi
            echo "Downloading @opentui/core-${pkg}@0.2.10..."
            mkdir -p "$dir"
            tarball_url="https://registry.npmjs.org/@opentui/core-${pkg}/-/core-${pkg}-0.2.10.tgz"
            curl -sS "$tarball_url" | tar -xz -C "$dir" --strip-components=1
          done

      - name: Build standalone binary
        shell: bash
        run: |
          bun build --compile \
            --target ${{ matrix.target }} \
            ./packages/cli/src/index.tsx \
            --outfile ${{ matrix.binary }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: ./binaries
          merge-multiple: true

      - name: List binaries
        run: ls -lh ./binaries/

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.tag.outputs.name != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release create "$TAG" \
            --title "MantraCode $TAG" \
            --generate-notes \
            ./binaries/* \
            || gh release upload "$TAG" ./binaries/* --clobber
